<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>October Coast Summer Art Camp</title>
    <style>
        /* Typography: Fredoka (Playful) and Nunito (Clean) */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;600;700&display=swap');

        :root {
            --navy: #0a1128;
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --yellow: #ffff00;
            --black-cmyk: #1a1a1a;
            --text-light: #f0f4f8;
            --text-muted: #cbd5e1;
        }

        /* The CMYK Edge Border */
        .page-frame {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; 
            z-index: 9999;
            border-top: 6px solid var(--cyan);
            border-right: 6px solid var(--magenta);
            border-bottom: 6px solid var(--yellow);
            border-left: 6px solid var(--black-cmyk);
        }

        /* Stylized SVG Grass Footer */
        .grass-bg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            z-index: -1; /* Keeps it behind text */
            opacity: 0.15; /* Subtle transparency */
            pointer-events: none;
        }

        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--navy);
            color: var(--text-light);
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.7;
        }

        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px 100px 20px;
        }

        /* Sticky Navigation */
        .sticky-nav {
            position: sticky;
            top: 0;
            background: rgba(10, 17, 40, 0.95);
            backdrop-filter: blur(5px);
            z-index: 1000;
            padding: 15px 0;
            border-bottom: 2px dashed rgba(0, 255, 255, 0.3);
            text-align: center;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--yellow);
            transform: scale(1.1);
        }

        /* Fix scrolling offset so nav doesn't cover headers */
        section {
            scroll-margin-top: 80px; 
            margin-bottom: 50px;
        }

        h1, h2, h3, h4 {
            font-family: 'Fredoka', sans-serif;
            color: #ffffff;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .logo {
            max-width: 220px;
            margin-bottom: 15px;
        }

        .subtitle {
            font-family: 'Fredoka', sans-serif;
            color: var(--magenta);
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        /* News & Search */
        #newsSearch {
            width: 100%;
            padding: 12px 15px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            border-radius: 8px;
            border: 2px solid rgba(0, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-bottom: 20px;
            outline: none;
        }

        #newsSearch::placeholder {
            color: var(--text-muted);
        }

        #newsSearch:focus {
            border-color: var(--yellow);
        }

        .news-card {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--cyan);
            margin-bottom: 15px;
            transition: transform 0.2s ease;
        }
